{% extends 'tracker/base.html' %}
{% block title %}Düzenle · Parato{% endblock %}

{% block content %}
<style>
  .page-header { margin-bottom: 32px; }
  .page-header h1 { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .page-header p { font-family: var(--mono); font-size: 11px; color: var(--text-muted); margin-top: 3px; letter-spacing: 0.08em; text-transform: uppercase; }
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; max-width: 520px; }
  .form-label { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .form-group { margin-bottom: 20px; }
  .form-control, .form-select { width: 100%; background: var(--surface2); border: 1px solid rgba(74,222,128,0.12); border-radius: 10px; padding: 10px 14px; font-family: var(--sans); font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; appearance: none; }
  .form-control:focus, .form-select:focus { border-color: rgba(74,222,128,0.4); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .btn-submit { background: var(--green); color: #041a0c; border: none; padding: 11px; border-radius: 10px; font-family: var(--sans); font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.15s; width: 100%; margin-top: 8px; }
  .btn-submit:hover { background: #86efac; }
  .btn-cancel { display: block; text-align: center; margin-top: 12px; font-size: 13px; color: var(--text-muted); text-decoration: none; }
  .btn-cancel:hover { color: var(--text); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
</style>

<div class="page-header">
  <h1>Harcamayı Düzenle</h1>
  <p>{{ harcama.baslik }}</p>
</div>

<div class="form-card">
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Başlık</label>
      <input type="text" name="baslik" class="form-control" value="{{ harcama.baslik }}" required>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Tutar (₺)</label>
        <input type="number" name="tutar" class="form-control" value="{{ harcama.tutar }}" step="0.01" required>
      </div>
      <div class="form-group">
        <label class="form-label">Tarih</label>
        <input type="date" name="tarih" class="form-control" value="{{ harcama.tarih|date:'Y-m-d' }}" required>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Kategori</label>
      <select name="kategori" class="form-select">
        <option value="market" {% if harcama.kategori == 'market' %}selected{% endif %}>🛒 Market</option>
        <option value="ulasim" {% if harcama.kategori == 'ulasim' %}selected{% endif %}>🚌 Ulaşım</option>
        <option value="saglik" {% if harcama.kategori == 'saglik' %}selected{% endif %}>💊 Sağlık</option>
        <option value="eglence" {% if harcama.kategori == 'eglence' %}selected{% endif %}>🎬 Eğlence</option>
        <option value="fatura" {% if harcama.kategori == 'fatura' %}selected{% endif %}>📄 Fatura</option>
        <option value="yemek" {% if harcama.kategori == 'yemek' %}selected{% endif %}>🍔 Yemek</option>
        <option value="diger" {% if harcama.kategori == 'diger' %}selected{% endif %}>📦 Diğer</option>
      </select>
    </div>
    <hr class="divider">
    <div class="form-group">
      <label class="form-label">Açıklama <span style="color:var(--text-dim)">(opsiyonel)</span></label>
      <textarea name="aciklama" class="form-control" rows="2">{{ harcama.aciklama }}</textarea>
    </div>
    <button type="submit" class="btn-submit">Güncelle →</button>
    <a href="{% url 'harcama_listesi' %}" class="btn-cancel">← Vazgeç</a>
  </form>
</div>
{% endblock %}
