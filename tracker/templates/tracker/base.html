<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Parato{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c0a;
      --surface: #0e1512;
      --surface2: #141c17;
      --border: rgba(74,222,128,0.1);
      --green: #4ade80;
      --text: #e2f5e9;
      --text-muted: #4a7a58;
      --text-dim: #2a4a35;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      font-family: var(--sans);
      color: var(--text);
      min-height: 100vh;
    }

    nav {
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
      position: sticky;
      top: 0;
      background: rgba(8,12,10,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .nav-logo {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      color: var(--green);
      letter-spacing: 0.08em;
      text-decoration: none;
    }
    .nav-logo span { color: var(--text-muted); }
    .nav-right { display: flex; align-items: center; gap: 4px; }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-links a:hover { color: var(--text); background: var(--surface2); }
    .nav-links a.active { color: var(--green); background: rgba(74,222,128,0.08); }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 16px;
      padding-left: 16px;
      border-left: 1px solid var(--border);
    }
    .nav-user span {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
    }
    .nav-user a {
      font-size: 12px;
      color: var(--text-dim);
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.15s;
    }
    .nav-user a:hover { color: var(--text-muted); border-color: rgba(74,222,128,0.25); }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="{% url 'dashboard' %}">parato<span>.ai</span></a>
  <div class="nav-right">
    {% if request.user.is_authenticated %}
    <div class="nav-links">
      <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
        <i class="bi bi-grid-1x2"></i> Genel Bakış
      </a>
      <a href="{% url 'harcama_listesi' %}" class="{% if request.resolver_match.url_name == 'harcama_listesi' %}active{% endif %}">
        <i class="bi bi-list-ul"></i> Harcamalar
      </a>
      <a href="{% url 'harcama_ekle' %}" class="{% if request.resolver_match.url_name == 'harcama_ekle' %}active{% endif %}">
        <i class="bi bi-plus-circle"></i> Ekle
      </a>
      <a href="{% url 'csv_yukle' %}" class="{% if request.resolver_match.url_name == 'csv_yukle' %}active{% endif %}">
        <i class="bi bi-upload"></i> CSV
      </a>
      <a href="{% url 'ai_analiz' %}" class="{% if request.resolver_match.url_name == 'ai_analiz' %}active{% endif %}">
        <i class="bi bi-stars"></i> AI Koç
      </a>
    </div>
    <div class="nav-user">
      <span>{{ request.user.username }}</span>
      <a href="{% url 'cikis' %}">Çıkış</a>
    </div>
    {% endif %}
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

{% block extra_js %}{% endblock %}
</body>
</html>
